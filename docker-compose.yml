services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hipp0-db
    environment:
      POSTGRES_USER: hipp0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hipp0_dev}
      POSTGRES_DB: hipp0
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - nexus_nexus_pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hipp0"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hipp0-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hipp0:${POSTGRES_PASSWORD:-hipp0_dev}@postgres:5432/hipp0}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      PORT: 3100
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HIPP0_EMBEDDINGS_URL: ${HIPP0_EMBEDDINGS_URL:-}
      HIPP0_EMBEDDINGS_KEY: ${HIPP0_EMBEDDINGS_KEY:-}
      HIPP0_EMBEDDINGS_MODEL: ${HIPP0_EMBEDDINGS_MODEL:-}
      HIPP0_LLM_URL: ${HIPP0_LLM_URL:-}
      HIPP0_LLM_KEY: ${HIPP0_LLM_KEY:-}
      HIPP0_LLM_MODEL: ${HIPP0_LLM_MODEL:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      DISTILLERY_PROVIDER: ${DISTILLERY_PROVIDER:-}
      HIPP0_CORS_ORIGINS: ${HIPP0_CORS_ORIGINS:-}
    ports:
      - "3100:3100"
    volumes:
      - ./supabase/migrations:/app/supabase/migrations:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        VITE_API_URL: ""
        CACHE_BUSTER: ${CACHE_BUSTER:-1}
    container_name: hipp0-dashboard
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3200:80"
    restart: unless-stopped

volumes:
  # CRITICAL: Do NOT rename this volume — it contains all production data.
  nexus_nexus_pgdata:
    external: true
