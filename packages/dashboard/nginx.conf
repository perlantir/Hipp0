server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Disable server version disclosure
    server_tokens off;

    # ── index.html: NEVER cache ──────────────────────────────────────
    # This is the SPA entry point. It must always be fetched fresh so
    # the browser picks up new hashed JS/CSS bundle references.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── SPA fallback — serve index.html for all routes ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Default: no-cache for non-asset paths (HTML, manifest, etc.)
        add_header Cache-Control "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── Hashed static assets: cache forever ──────────────────────────
    # Vite adds content hashes to filenames (e.g. index-HyB6fMhv.js).
    # These are safe to cache immutably — a new hash = new URL.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Other static files (icons, manifest, fonts) ──────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public" always;
    }

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
